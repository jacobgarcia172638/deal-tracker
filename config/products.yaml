# ============================================================
# PRODUCT TRACKING CONFIG
# ============================================================
# This is the ONLY file you should ever need to edit by hand.
#
# It has TWO sections:
#
#   1. deal_sources - broad deal coverage across many retailers,
#      pulled automatically from established deal-aggregator sites
#      (Slickdeals, DealNews, etc.). You don't need to touch this
#      unless you want to add another aggregator's RSS feed later.
#      These links are NOT affiliate links -- they point at the
#      original deal post, so they're shown without an affiliate
#      label on the site (that would be inaccurate).
#
#   2. products - a hand-picked list of SPECIFIC products you want
#      watched closely for price drops/restocks, using your own
#      affiliate link. This is the section you'll edit most.
#
# Changes to either section are picked up automatically on the NEXT
# scheduled run (every few hours) — no coding, no rebuilding, nothing
# else to do.
# ============================================================

# ------------------------------------------------------------
# 1. Broad deal coverage (many retailers, via RSS)
# ------------------------------------------------------------
# Fields:
#   name    - A label shown on the site for where the deal came from.
#   rss_url - The public RSS feed URL for that aggregator.
# ------------------------------------------------------------
deal_sources:
  - name: "Slickdeals - Frontpage"
    rss_url: "https://slickdeals.net/newsearch.php?mode=frontpage&rss=1"

  - name: "DealNews - Top Deals"
    rss_url: "https://www.dealnews.com/?rss=1&sort=time"

  # - name: "Another Aggregator"
  #   rss_url: "https://example.com/deals/rss"

# ------------------------------------------------------------
# 2. Specific products you want watched closely
# ------------------------------------------------------------
# To add a product: copy one of the blocks below, change the
# values, save the file. To remove a product: delete its block.
#
# Fields:
#   name           - A label for your reference. Shown on the site.
#   url            - The product page the robot should check.
#   affiliate_link - The link shown to visitors on the site. Use your
#                    real Amazon affiliate link once you're approved.
#                    Until then, just repeat the plain "url" here.
#   in_stock_text  - A short snippet of text that only appears on the
#                    page when the item is IN STOCK, e.g. "In Stock"
#                    or "Add to Cart". Used to detect restocks.
#                    If you're not sure, "In Stock" is a reasonable
#                    default to start with — you can refine it later.
# ------------------------------------------------------------
products:
  - name: "Example Wireless Mouse"
    url: "https://www.amazon.com/dp/B0EXAMPLE1"
    affiliate_link: "https://www.amazon.com/dp/B0EXAMPLE1?tag=YOURTAG-20"
    in_stock_text: "In Stock"

  - name: "Example Bluetooth Speaker"
    url: "https://www.amazon.com/dp/B0EXAMPLE2"
    affiliate_link: "https://www.amazon.com/dp/B0EXAMPLE2?tag=YOURTAG-20"
    in_stock_text: "In Stock"

  # - name: "Another Product"
  #   url: "https://www.amazon.com/dp/PASTE_ASIN_HERE"
  #   affiliate_link: "https://www.amazon.com/dp/PASTE_ASIN_HERE?tag=YOURTAG-20"
  #   in_stock_text: "In Stock"
